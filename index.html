                          Row Entropy Comparison
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginBottom: 8, fontSize: 10 }}>
                          <span style={{ color: COLORS.entropy }}>■ Site A</span>
                          <span style={{ color: COLORS.periodicity }}>■ Site B</span>

                        <div style={{ position: 'relative' }}>
                          <SVGLineChart data={compAnalysisA.entropy.rowEntropies} color={COLORS.entropy} width={chartWidth} yMax={1} title="Site A — Row Entropy" />
                          <div style={{ marginTop: 8 }}>
                            <SVGLineChart data={compAnalysisB.entropy.rowEntropies} color={COLORS.periodicity} width={chartWidth} yMax={1} title="Site B — Row Entropy" />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* ═══ MATRIX PANEL ═══ */}

                      const colorKeyFor = classColorKey;
                      return (
                        <div style={{ background: COLORS.bgCard, border: `1px solid ${COLORS.borderMed}`, borderRadius: 4, padding: 20 }}>

                              <span style={{ color: COLORS.textMuted }}> vs </span>
                              <strong>{pair.nameB}</strong>
                            </div>
                            <div className="bebas" style={{ fontSize: 24, color: COLORS.accent }}>{(pair.similarity * 100).toFixed(1)}%</div>

                          <div style={{ display: 'flex', gap: 16, marginBottom: 12, fontSize: 10, flexWrap: 'wrap' }}>
                            <span style={{ color: CLASSIFICATION_COLORS[colorKeyFor(pair.classA.type)] }}>

                            </span>
                            <span style={{ color: CLASSIFICATION_COLORS[colorKeyFor(pair.classB.type)] }}>

                          </div>
                          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(5, 1fr)', gap: 8 }}>
                            {[
                              { label: 'Entropy', value: pair.detail.entropyCorrelation, color: COLORS.entropy },
                              { label: 'Compression', value: pair.detail.sharedCompressionRatio, color: COLORS.rle },
                              { label: 'Vocabulary', value: pair.detail.vocabularyOverlap, color: COLORS.vocabulary },
                              { label: 'Periodicity', value: pair.detail.periodicityAlignment, color: COLORS.periodicity },
                              { label: 'Absence', value: pair.detail.absenceSimilarity, color: COLORS.absence },
                            ].map(({ label, value, color }) => (
                              <div key={label} style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: 9, color: COLORS.textMuted, marginBottom: 4 }}>{label}</div>

                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })()}

                    {/* Top 5 most similar */}
                    <div style={{ background: COLORS.bgCard, border: `1px solid ${COLORS.borderSubtle}`, borderRadius: 4, padding: 16 }}>

                          <span style={{ fontSize: 11, color: COLORS.textPrimary }}>{pair.nameA}</span>
                          <span style={{ fontSize: 10, color: COLORS.textMuted }}>×</span>
                          <span style={{ fontSize: 11, color: COLORS.textPrimary }}>{pair.nameB}</span>

                    {/* Top 5 most dissimilar */}

                      <div style={{ fontSize: 10, letterSpacing: 2, color: COLORS.textMuted, textTransform: 'uppercase', marginBottom: 12 }}>
                        Top 5 Most Dissimilar Pairs
                      </div>
                      {matrixResults.pairs.slice(-5).reverse().map((pair, idx) => (
                        <div key={idx} style={{
                          display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0',
                          borderBottom: idx < 4 ? `1px solid ${COLORS.borderSubtle}` : 'none',
                        }}>
                          <span className="bebas" style={{ fontSize: 16, color: COLORS.textMuted, minWidth: 50 }}>{(pair.similarity * 100).toFixed(1)}%</span>
                          <span style={{ fontSize: 11, color: COLORS.textPrimary }}>{pair.nameA}</span>
                          <span style={{ fontSize: 10, color: COLORS.textMuted }}>×</span>
                          <span style={{ fontSize: 11, color: COLORS.textPrimary }}>{pair.nameB}</span>
                        </div>

                    </div>

                    {/* Rebuild button */}
                    <div style={{ textAlign: 'center' }}>
                      <button className="analyze-btn" onClick={handleBuildMatrix} style={{ fontSize: 14, padding: '8px 28px', letterSpacing: 1 }}>
                        REBUILD MATRIX
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ═══ SYNTHESIS PANEL ═══ */}
            {activePanel === 'synthesis' && (
              <div style={{ animation: 'fadeInUp 0.3s ease-out' }}>
                <h2 className="bebas" style={{ fontSize: 20, letterSpacing: 1, color: COLORS.synthesis, marginBottom: 20 }}>

                </h2>

                  </p>

                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>

                      { id: 'narrative', label: 'Narrative', color: CLASSIFICATION_COLORS.narrative },
                      { id: 'pictographic', label: 'Pictographic', color: CLASSIFICATION_COLORS.pictographic },
                    ].map(m => (
                      <button
                        key={m.id}
                        className={`panel-tab ${synthMode === m.id ? 'active' : ''}`}

                          flex: 1, minWidth: 200, padding: '8px 12px',

                      <button
                        className="analyze-btn"

                    </div>
                  </section>

                  {/* Results */}
                  {synthGrid && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

                      {/* Grid Preview */}

                        <div style={{ overflowX: 'auto' }}>
                          <svg width={Math.min(synthGrid[0].length * 4, 560)} height={Math.min(synthGrid.length * 4, 200)}
                            viewBox={`0 0 ${synthGrid[0].length * 4} ${synthGrid.length * 4}`} style={{ display: 'block' }}>
                            {synthGrid.map((row, ri) => row.map((cell, ci) => (
                              <rect key={`${ri}-${ci}`} x={ci * 4} y={ri * 4} width={4} height={4}
                                fill={cell ? COLORS.gridActive : COLORS.gridInactive} />

                          </svg>
                        </div>
                        <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 8 }}>
                          {synthGrid.length} rows × {synthGrid[0].length} cols

                      </section>

                        <section style={{ background: COLORS.bgCard, border: `1px solid ${synthDecode.match ? COLORS.success : COLORS.dangerLight}`, borderRadius: 4, padding: 20 }}>

                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>

                              { label: 'ENCODE', pass: !!synthGrid },
                              { label: 'ANALYZE', pass: !!synthAnalysis },
                              { label: 'CLASSIFY', pass: !!synthClassification },
                              { label: 'VERIFY', pass: synthDecode.match },
                            ].map((step, i) => (
                              <React.Fragment key={i}>
                                {i > 0 && <span style={{ color: COLORS.textMuted, fontSize: 14 }}>→</span>}
                                <div style={{
                                  padding: '6px 12px', borderRadius: 3, fontSize: 10, letterSpacing: 2, fontWeight: 700,
                                  background: step.pass ? rgba(COLORS.success, 0.15) : rgba(COLORS.dangerLight, 0.15),
                                  color: step.pass ? COLORS.success : COLORS.dangerLight,
                                  border: `1px solid ${step.pass ? COLORS.success : COLORS.dangerLight}`,

                              </React.Fragment>
                            ))}
                          </div>

                          <div style={{ display: 'flex', gap: 24, fontSize: 11, flexWrap: 'wrap' }}>
                            <div>
                              <span style={{ color: COLORS.textMuted }}>Expected: </span>
                              <span style={{ color: COLORS.textPrimary, fontWeight: 700 }}>{synthDecode.expectedType.replace(/_/g, ' ')}</span>
                            </div>
                            <div>
                              <span style={{ color: COLORS.textMuted }}>Got: </span>
                              <span style={{ color: synthDecode.match ? COLORS.success : COLORS.dangerLight, fontWeight: 700 }}>{synthDecode.actualType.replace(/_/g, ' ')}</span>
                            </div>
                            {synthClassification && (
                              <div>
                                <span style={{ color: COLORS.textMuted }}>Confidence: </span>
                                <span style={{ color: COLORS.textPrimary }}>{(synthClassification.confidence * 100).toFixed(1)}%</span>
                              </div>
                            )}
                          </div>

                          {/* Classification score bars */}
                          {synthClassification && (
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginTop: 16 }}>
                              {[
                                { key: 'ledger', label: 'Ledger', score: synthClassification.scores.ledger },
                                { key: 'narrative', label: 'Narrative', score: synthClassification.scores.narrative },
                                { key: 'pictographic', label: 'Pictographic', score: synthClassification.scores.pictographic },

                                <div key={key} style={{ textAlign: 'center' }}>
                                  <div style={{ fontSize: 9, color: COLORS.textMuted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 2 }}>{label}</div>
                                  <div style={{ height: 4, background: COLORS.bgElevated, borderRadius: 2 }}>
                                    <div style={{ width: `${score * 100}%`, height: '100%', background: CLASSIFICATION_COLORS[key], borderRadius: 2 }} />
                                  </div>
                                  <div style={{ fontSize: 10, color: CLASSIFICATION_COLORS[key], marginTop: 1 }}>{(score * 100).toFixed(0)}%</div>
                                </div>
                              ))}
                            </div>
                          )}
                        </section>
                      )}

                    </div>

                      <button key={t} onClick={() => setTheme(t)} style={{
                        fontFamily: "'Space Mono', monospace", fontSize: 11, letterSpacing: 1,
                        padding: '8px 18px', background: theme === t ? rgba(COLORS.accent, 0.1) : COLORS.bgElevated,
                        border: `1px solid ${theme === t ? COLORS.accent : COLORS.borderSubtle}`,
                        color: theme === t ? COLORS.accent : COLORS.textMuted,
                        cursor: 'pointer', borderRadius: 3, textTransform: 'uppercase',
                      }}>{t}</button>
                    ))}
                  </div>
                  <div style={{ fontSize: 9, color: COLORS.textMuted, marginTop: 8, lineHeight: 1.6 }}>
                    Theme preference is saved to localStorage.
                  </div>
                </div>

                {/* ── Danger Zone ── */}
                <div style={{
                  background: COLORS.bgCard, border: `1px solid ${rgba(COLORS.danger, 0.2)}`,
                  borderRadius: 4, padding: 20,
                }}>
                  <h3 className="bebas" style={{ fontSize: 16, letterSpacing: 1, color: COLORS.danger, margin: '0 0 12px 0' }}>
                    Danger Zone
                  </h3>
                  <p style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.6 }}>
                    This will clear all API keys from memory and localStorage.
                  </p>
                  <button
                    onClick={clearAllKeys}
                    style={{
                      fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: 1,
                      padding: '8px 18px', background: rgba(COLORS.danger, 0.08),
                      border: `1px solid ${rgba(COLORS.danger, 0.3)}`,
                      color: COLORS.danger, cursor: 'pointer', borderRadius: 3,
                      transition: 'all 0.3s ease',
                    }}
                  >CLEAR ALL API KEYS</button>
                </div>
              </div>
            )}

          </main>

          {/* ── FOOTER ── */}
          <footer style={{
            textAlign: 'center', padding: '24px 16px 32px',
            borderTop: `1px solid ${COLORS.borderSubtle}`,
          }}>
            <div style={{ fontSize: 10, letterSpacing: 1, color: COLORS.textMuted, textTransform: 'uppercase', marginBottom: 10 }}>
              GLYPH v1.0.0 — by Nuralyn LLC
            </div>
            <button
              onClick={() => {
                const bibtex = `@software{glyph2026,\n  title   = {GLYPH: Ground-Level Yield of Patterned Histories},\n  author  = {Nuralyn LLC},\n  year    = {2026},\n  url     = {https://glyph.nuralyn.com},\n  license = {MIT}\n}`;
                navigator.clipboard.writeText(bibtex).then(() => showToast('BibTeX copied to clipboard'));
              }}
              style={{
                background: 'none', border: `1px solid ${COLORS.borderSubtle}`,
                color: COLORS.textMuted, fontSize: 9, padding: '5px 14px',
                cursor: 'pointer', borderRadius: 3, fontFamily: "'Space Mono', monospace",
                letterSpacing: 1, transition: 'all 0.2s ease',
              }}
              onMouseEnter={e => { e.target.style.color = COLORS.accent; e.target.style.borderColor = rgba(COLORS.accent, 0.3); }}
              onMouseLeave={e => { e.target.style.color = COLORS.textMuted; e.target.style.borderColor = COLORS.borderSubtle; }}
            >CITE GLYPH</button>
          </footer>

          {/* ── TOAST ── */}
          {toast && (
            <div style={{
              position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
              background: COLORS.bgCard, border: `1px solid ${COLORS.borderMed}`,
              borderRadius: 4, padding: '10px 20px', fontSize: 11, color: COLORS.textSecondary,
              boxShadow: `0 4px 16px ${COLORS.shadow}`,
              animation: 'fadeInUp 0.2s ease-out', zIndex: 9999,
            }}>{toast}</div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
